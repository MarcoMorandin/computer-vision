data_source:
  _target_: cv_pipeline.data_sources.data_sources.RoboflowDataSource
  type: roboflow_dataset
  api_key: hxV5hVaLyFxEucIzLY1p
  workspace: hpe-8ebos
  project: hpe_7
  version: 2
  format_type: coco
  download_path: dataset
  dataset_path: dataset
  annotation_file: train/_annotations.coco.json
  max_frames: 10
  load_images: true
  load_annotations: true
pose_model:
  _target_: cv_pipeline.pose_estimation.yolo_estimator.YOLOPoseEstimator
  type: yolo
  model_name: cv_pipeline/pose_estimation/models/yolo11l-pose.pt
  confidence_threshold: 0.25
  device: auto
pipeline:
  enable_rectification: true
  enable_triangulation: true
  enable_reprojection: true
  min_cameras_for_triangulation: 2
  confidence_threshold: 0.25
camera:
  params_version: v2
  calibration_base_dir: data/camera_data_${camera.params_version}
output:
  base_dir: output/comprehensive_pipeline
  save_intermediate: true
  save_visualizations: true
  save_3d_poses: true
logging:
  level: INFO
  save_logs: true
  log_file: ${output.base_dir}/pipeline.log
pose_estimation:
  model_name: yolo11l-pose.pt
  confidence_threshold: 0.25
  save_predictions: true
  save_visualizations: true
rectification:
  camera_params_dir: data/camera_data_v3
  use_cached_params: true
  save_rectified_images: true
  rectification_method: stereo
triangulation:
  method: least_squares
  min_cameras: 2
  save_3d_skeleton: true
  create_animation: true
  filter_outliers: true
evaluation:
  metrics:
  - pck
  - mpjpe
  - reprojection_error
  pck_threshold: 0.1
  save_reprojections: true
  compute_detailed_metrics: true
visualization:
  figure_size:
  - 12
  - 8
  dpi: 300
  save_individual_steps: true
  create_summary_plots: true
  skeleton_color_gt:
  - 255
  - 0
  - 0
  skeleton_color_pred:
  - 0
  - 255
  - 0
  animation_fps: 10
  animation_duration: 5.0
